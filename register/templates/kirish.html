<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foydalanuvchi Tekshiruvi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96c93d);
            background-size: 400%;
            animation: colorShift 10s ease infinite;
            overflow: hidden;
        }

        @keyframes colorShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .container:hover {
            transform: translateY(-10px) rotateX(5deg) rotateY(5deg);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            color: #ffffff; /* 100% tiniq oq rang */
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3), 0 0 10px rgba(255, 255, 255, 0.5);
            margin-bottom: 2rem;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(255, 255, 255, 0.7), 0 2px 4px rgba(0, 0, 0, 0.3); }
            to { text-shadow: 0 0 20px rgba(255, 255, 255, 1), 0 2px 4px rgba(0, 0, 0, 0.3); }
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            font-size: clamp(0.9rem, 3vw, 1rem);
            color: #ffffff; /* 100% tiniq oq rang */
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            display: block;
            margin-bottom: 0.5rem;
            transition: transform 0.3s ease;
        }

        .form-group label:hover {
            transform: translateX(5px);
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .form-group input::placeholder {
            color: #ffffff; /* 100% tiniq oq rang */
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .form-group button {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #1a1a1a;
            font-size: clamp(1rem, 3vw, 1.1rem);
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), 0 0 30px rgba(255, 215, 0, 0.5);
            transition: transform 0.4s ease, box-shadow 0.4s ease, background 0.4s ease;
            position: relative;
            overflow: hidden;
            transform: perspective(500px) rotateX(0deg) rotateY(0deg);
        }

        .form-group button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            transition: 0.5s;
        }

        .form-group button:hover::before {
            left: 100%;
        }

        .form-group button:hover {
            transform: perspective(500px) translateY(-10px) rotateX(15deg) rotateY(15deg);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.7);
            background: linear-gradient(45deg, #FFE600, #FF8C00);
        }

        .error-message {
            color: #ff4d4d;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            text-align: center;
            margin-top: 1rem;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        /* Media so'rovlar */
        @media (min-width: 1200px) {
            .container { max-width: 500px; padding: 2.5rem; }
            h1 { font-size: 2.5rem; }
            .form-group input { padding: 1rem; }
            .form-group button { padding: 1rem; }
        }

        @media (max-width: 1024px) {
            .container { max-width: 80%; padding: 2rem; }
            h1 { font-size: 2rem; }
        }

        @media (max-width: 768px) {
            .container { max-width: 90%; padding: 1.5rem; }
            h1 { font-size: 1.8rem; }
            .form-group input { padding: 0.8rem; }
            .form-group button { padding: 0.8rem; }
        }

        @media (max-width: 480px) {
            .container { max-width: 95%; padding: 1rem; }
            h1 { font-size: 1.5rem; }
            .form-group label { font-size: 0.9rem; }
            .form-group input { font-size: 0.8rem; padding: 0.7rem; }
            .form-group button { font-size: 0.9rem; padding: 0.7rem; }
            .error-message { font-size: 0.7rem; }
        }

        @media (max-width: 320px) and (max-height: 400px) {
            .container { max-width: 98%; padding: 0.8rem; }
            h1 { font-size: 1.2rem; }
            .form-group label { font-size: 0.8rem; }
            .form-group input { font-size: 0.7rem; padding: 0.5rem; }
            .form-group button { font-size: 0.8rem; padding: 0.5rem; }
            .error-message { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Foydalanuvchini Tekshirish</h1>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Ism</label>
                <input type="text" id="name" name="name" placeholder="Ismingizni kiriting" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email manzilingizni kiriting" required>
            </div>
            <div class="form-group">
                <button type="submit">Tekshirish</button>
            </div>
        </form>
        {% if messages %}
        <div class="error-message">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</body>
</html>
