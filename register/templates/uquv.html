<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>🎒 O‘quvchilar Galereyasi</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #fef9c3, #e0f2fe);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    .glass-card {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .glass-card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }

    .fade-in {
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body class="p-6">

  <h1 class="text-4xl font-bold text-center text-gray-800 mb-10 fade-in">🎓 Bizning Faxrli O‘quvchilarimiz</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
    {% for photo in photos %}
    <div class="glass-card rounded-2xl overflow-hidden fade-in">
      <img src="{{ photo.image.url }}" alt="{{ photo.title }}" class="w-full h-60 object-cover">
      <div class="p-5">
        <h2 class="text-xl font-bold text-gray-900 mb-2">{{ photo.title }}</h2>
        <p class="text-gray-800 text-sm text-justify leading-relaxed">{{ photo.description }}</p>
      </div>
    </div>
    {% endfor %}
  </div>

</body>
</html>
